<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>照片日记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;background:#0d0d0d;color:#e0e0e0;min-height:100dvh}
.header{position:sticky;top:0;z-index:10;background:rgba(13,13,13,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.header h1{font-size:20px;font-weight:600;letter-spacing:0.5px}
.header .date{font-size:13px;color:#888;margin-top:2px}
.header .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
.badge-free{background:rgba(255,255,255,0.12);color:#999}
.badge-pro{background:rgba(255,215,0,0.2);color:#f0c040}
.container{padding:20px;max-width:640px;margin:0 auto}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.photo-grid .add-btn{aspect-ratio:1;border:1.5px dashed rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#666;font-size:32px;cursor:pointer;transition:all 0.2s}
.photo-grid .add-btn:hover,.photo-grid .add-btn:active{border-color:rgba(255,255,255,0.5);color:#aaa}
.photo-slot{aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;background:#1a1a1a}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-slot .remove{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,0.7);color:#fff;border:none;font-size:14px;line-height:24px;text-align:center;cursor:pointer;opacity:0;transition:opacity 0.2s}
.photo-slot:hover .remove,.photo-slot:active .remove{opacity:1}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:#fff;color:#000}
.btn-primary:disabled{background:#333;color:#666;cursor:not-allowed}
.btn-primary:not(:disabled):active{transform:scale(0.98)}
.btn-gold{background:linear-gradient(135deg,#f0c040,#d4a020);color:#000}
.btn-gold:active{transform:scale(0.98)}
.hint{text-align:center;color:#555;font-size:14px;margin:40px 0;line-height:1.8}
.diary-output{margin-top:24px}
.diary-output .card{background:#1a1a1a;border-radius:16px;padding:24px;line-height:1.9;font-size:15px;white-space:pre-wrap;word-break:break-word}
.diary-output .card h2{font-size:17px;margin:20px 0 8px}
.diary-output .card h2:first-child{margin-top:0}
.diary-output .card em{color:#b8b8b8}
.loading{text-align:center;padding:40px 0}
.spinner{width:32px;height:32px;border:3px solid #333;border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.actions{display:flex;gap:8px;margin-top:16px}
.btn-sm{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:500;border:none;cursor:pointer;background:#252525;color:#ccc;text-align:center;text-decoration:none}
.btn-sm:active{background:#333}
.info-tag{font-size:11px;color:#555;text-align:center;margin-top:8px}
#fileInput{display:none}
/* Paywall */
.paywall{text-align:center;padding:32px 20px;margin-top:24px;background:#1a1a1a;border-radius:16px}
.paywall .icon{font-size:48px;margin-bottom:12px}
.paywall h2{font-size:18px;margin-bottom:8px}
.paywall .price{font-size:32px;font-weight:700;color:#f0c040;margin:16px 0}
.paywall .desc{font-size:13px;color:#888;line-height:1.8;margin-bottom:20px}
.paywall .activate-link{font-size:13px;color:#666;margin-top:16px;cursor:pointer;text-decoration:underline}
.activate-form{margin-top:8px;display:none}
.activate-form input{width:100%;padding:12px;border-radius:10px;background:#252525;border:1px solid #333;color:#fff;font-size:14px;text-align:center;letter-spacing:1px}
.activate-form .btn{margin-top:8px}
.activate-form .msg{font-size:12px;margin-top:4px;color:#e05555}
.activate-form .msg.ok{color:#4caf50}
.trial-counter{text-align:center;font-size:12px;color:#555;margin-top:12px}
</style>
</head>
<body>
<div class="header">
  <h1>照片日记<span class="badge badge-free" id="tierBadge">试用</span></h1>
  <div class="date" id="todayDate"></div>
</div>
<div class="container">
  <div class="photo-grid" id="photoGrid">
    <div class="add-btn" id="addBtn">+</div>
  </div>
  <div class="hint" id="hint">选几张今天的照片<br>AI 帮你写一篇日记</div>
  <button class="btn btn-primary" id="generateBtn" disabled>生成日记</button>
  <div class="trial-counter" id="trialCounter"></div>
  <div id="resultArea"></div>
  <input type="file" id="fileInput" accept="image/*" multiple>
</div>
<script>
// ── Config ──────────────────────────────────────────────
// API_BASE: '' = same-origin (for production when frontend & backend share domain)
// For local dev: set to 'http://localhost:8888'
const API_BASE = (()=>{
  const p = new URLSearchParams(location.search);
  return p.get('api') || '';  // e.g. ?api=http://localhost:8888
})();

// ── State ───────────────────────────────────────────────
const MAX_PHOTOS = 9;
const TRIAL_LIMIT = 3;
let photos = [];
let quota = TRIAL_LIMIT;
let licenseKey = '';

const $=(s)=>document.querySelector(s);
const today=new Date();
$('#todayDate').textContent=`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 星期${'日一二三四五六'[today.getDay()]}`;

// ── Trial / License ─────────────────────────────────────
function loadLicense(){
  licenseKey = localStorage.getItem('pd_license') || '';
  const used = parseInt(localStorage.getItem('pd_trial_used')||'0');
  quota = Math.max(0, TRIAL_LIMIT - used);
  if(licenseKey){
    $('#tierBadge').textContent = 'PRO';
    $('#tierBadge').className = 'badge badge-pro';
    $('#trialCounter').textContent = '';
  } else if(quota>0){
    $('#tierBadge').textContent = '试用';
    $('#tierBadge').className = 'badge badge-free';
    $('#trialCounter').textContent = `剩余免费次数：${quota}`;
  } else {
    $('#tierBadge').textContent = '试用';
    $('#tierBadge').className = 'badge badge-free';
    $('#trialCounter').textContent = '免费次数已用完';
  }
}

function useQuota(){
  if(!licenseKey){
    const used = parseInt(localStorage.getItem('pd_trial_used')||'0');
    localStorage.setItem('pd_trial_used', String(used+1));
    quota = Math.max(0, TRIAL_LIMIT - used - 1);
    loadLicense();
  }
}

function activateLicense(key){
  return fetch(API_BASE+'/api/activate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code:key.trim()})
  }).then(r=>r.json());
}

loadLicense();

// ── Paywall ──────────────────────────────────────────────
function showPaywall(){
  const html = `
    <div class="paywall">
      <div class="icon">🔑</div>
      <h2>试用次数已用完</h2>
      <p class="desc">照片日记由 AI 驱动，每篇日记都有成本。<br>一次购买，永久使用，无订阅。</p>
      <div class="price">¥9.9 永久</div>
      <button class="btn btn-gold" onclick="openPayment()">立即购买</button>
      <div class="activate-link" onclick="toggleActivate()">已有激活码？点此输入</div>
      <div class="activate-form" id="activateForm">
        <input type="text" id="activateInput" placeholder="输入激活码" maxlength="32">
        <button class="btn btn-primary" onclick="doActivate()">激活</button>
        <div class="msg" id="activateMsg"></div>
      </div>
    </div>`;
  $('#resultArea').innerHTML = html;
  document.getElementById('activateInput')?.focus();
}

function toggleActivate(){
  const form = $('#activateForm');
  form.style.display = form.style.display==='block'?'none':'block';
  if(form.style.display==='block') $('#activateInput')?.focus();
}

async function doActivate(){
  const input = $('#activateInput');
  const msg = $('#activateMsg');
  if(!input.value.trim()){ msg.textContent='请输入激活码'; msg.className='msg'; return; }
  msg.textContent='验证中...'; msg.className='msg';
  try{
    const resp = await activateLicense(input.value.trim());
    if(resp.valid){
      licenseKey = input.value.trim();
      localStorage.setItem('pd_license', licenseKey);
      msg.textContent='激活成功！'; msg.className='msg ok';
      setTimeout(()=>{ $('#resultArea').innerHTML=''; loadLicense(); }, 800);
    }else{
      msg.textContent=resp.error||'激活码无效';
      msg.className='msg';
    }
  }catch(e){
    msg.textContent='网络错误，请重试';
    msg.className='msg';
  }
}

function openPayment(){
  // Replace with your 面包多 product URL
  window.open('https://mbd.pub/xxx', '_blank');
}

// ── EXIF ─────────────────────────────────────────────────
function extractExifTime(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const buf=new Uint8Array(reader.result);
      let dt='';
      for(let i=0;i<buf.length-1;i++){
        if(buf[i]===0xFF&&buf[i+1]===0xE1){
          const exifStart=i+4;
          const exifView=new DataView(buf.buffer,exifStart);
          if(exifView.getUint32(0)===0x45786966){
            const tiffOffset=6;
            const le=exifView.getUint16(tiffOffset)===0x4949;
            const ifd0Offset=exifView.getUint32(tiffOffset+4,le);
            let idx=tiffOffset+ifd0Offset;
            const count=exifView.getUint16(idx,le); idx+=2;
            for(let j=0;j<count;j++){
              const tag=exifView.getUint16(idx,le);
              if(tag===0x9003||tag===0x0132){
                const type=exifView.getUint16(idx+2,le);
                const len=exifView.getUint32(idx+4,le);
                const valOff=exifView.getUint32(idx+8,le);
                if(type===2&&len<=40){
                  const src=new Uint8Array(buf.buffer,exifStart+tiffOffset+valOff,len-1);
                  dt=new TextDecoder().decode(src);
                  if(tag===0x9003){resolve(dt);return;}
                }
              }
              idx+=12;
            }
          }
          break;
        }
      }
      resolve(dt);
    };
    reader.readAsArrayBuffer(file);
  });
}

// ── Image handling ──────────────────────────────────────
async function handleFiles(e){
  const files=Array.from(e.target.files);
  for(const f of files){
    if(photos.length>=MAX_PHOTOS)break;
    if(!f.type.startsWith('image/'))continue;
    const tsPromise=extractExifTime(f);
    const imgPromise=resizeImage(f);
    const [timestamp,dataUrl]=await Promise.all([tsPromise,imgPromise]);
    photos.push({dataUrl,name:f.name,timestamp});
    renderPhotos();
  }
  fileInput.value='';
}

function resizeImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1200;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){
          if(w>h){h=Math.round(h*MAX/w);w=MAX;}
          else{w=Math.round(w*MAX/h);h=MAX;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.6));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Grid rendering ──────────────────────────────────────
const grid=$('#photoGrid');
const addBtn=$('#addBtn');
const fileInput=$('#fileInput');
const generateBtn=$('#generateBtn');
const hint=$('#hint');
const resultArea=$('#resultArea');

addBtn.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',handleFiles);

function renderPhotos(){
  grid.innerHTML='';
  photos.forEach((p,i)=>{
    const slot=document.createElement('div');
    slot.className='photo-slot';
    slot.innerHTML=`<img src="${p.dataUrl}"><button class="remove" data-idx="${i}">&times;</button>`;
    slot.querySelector('.remove').addEventListener('click',e=>{
      e.stopPropagation();
      photos.splice(i,1);
      renderPhotos();
    });
    grid.appendChild(slot);
  });
  if(photos.length<MAX_PHOTOS) grid.appendChild(addBtn);
  hint.style.display=photos.length?'none':'block';
  generateBtn.disabled=photos.length===0;
  generateBtn.textContent=photos.length?`生成日记 (${photos.length}张照片)`:'生成日记';
}

// ── Generate ─────────────────────────────────────────────
generateBtn.addEventListener('click',async()=>{
  if(!photos.length)return;

  // Check quota / license
  if(!licenseKey && quota<=0){
    showPaywall();
    return;
  }

  generateBtn.disabled=true;
  generateBtn.textContent='正在生成...';
  const sizeKB = (JSON.stringify({photos:photos.map(p=>p.dataUrl)}).length/1024).toFixed(0);
  resultArea.innerHTML=`<div class="loading"><div class="spinner"></div><div>上传中...</div><div style="font-size:12px;color:#555;margin-top:4px">压缩后约 ${sizeKB}KB</div></div>`;

  try{
    setTimeout(()=>{
      const el=resultArea.querySelector('.loading div:first-child');
      if(el)el.nextElementSibling.textContent='AI 正在端详你的照片...';
    }, 1500);

    const headers = {'Content-Type':'application/json'};
    if(licenseKey) headers['X-License-Key'] = licenseKey;

    const resp=await fetch(API_BASE+'/api/diary',{
      method:'POST',
      headers,
      body:JSON.stringify({
        photos:photos.map(p=>({dataUrl:p.dataUrl,timestamp:p.timestamp||''})),
        date:$('#todayDate').textContent
      })
    });
    const data=await resp.json();

    if(resp.status===403){
      // License invalid
      licenseKey=''; localStorage.removeItem('pd_license');
      loadLicense();
      showPaywall();
      resultArea.innerHTML += `<div style="color:#e05555;text-align:center;margin-top:8px">激活码已失效，请重新购买</div>`;
    }else if(data.error){
      resultArea.innerHTML=`<div class="card" style="color:#e05555">${escHtml(data.error)}</div>`;
    }else{
      useQuota();
      resultArea.innerHTML=`
        <div class="diary-output">
          <div class="card">${data.diary}</div>
          <div class="actions">
            <button class="btn-sm" onclick="copyDiary()">复制日记</button>
            <button class="btn-sm" onclick="saveDiary()">保存到文档</button>
          </div>
          <div class="info-tag">${data.model} · ${data.tokens} tokens</div>
        </div>`;
      window._diaryText=data.diary;
    }
  }catch(err){
    resultArea.innerHTML=`<div class="card" style="color:#e05555">请求失败: ${escHtml(err.message)}<br><br>请检查网络连接后重试。</div>`;
  }
  generateBtn.disabled=false;
  const n=photos.length;
  generateBtn.textContent=n?`生成日记 (${n}张照片)`:'生成日记';
});

// ── Copy / Save ──────────────────────────────────────────
async function copyDiary(){
  if(!window._diaryText)return;
  try{await navigator.clipboard.writeText(window._diaryText);alert('已复制');}
  catch(e){alert('复制失败，请手动选择文字');}
}

function saveDiary(){
  if(!window._diaryText)return;
  const blob=new Blob([window._diaryText],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const d=today.toISOString().slice(0,10);
  a.download=`photo-diary-${d}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── PWA ──────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
